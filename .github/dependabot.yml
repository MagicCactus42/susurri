version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - nuget
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
      serilog:
        patterns:
          - "Serilog*"
      opentelemetry:
        patterns:
          - "OpenTelemetry*"
      xunit:
        patterns:
          - "xunit*"
      coverlet:
        patterns:
          - "coverlet*"
      avalonia:
        patterns:
          - "Avalonia*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
