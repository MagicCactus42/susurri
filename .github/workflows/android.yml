name: android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ContinuousIntegrationBuild: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: install android workload
        run: dotnet workload install android

      # forks and PRs have no secrets — those builds fall back to a throwaway debug signature
      - name: prepare release keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret is not set — the APK ships with a debug signature. See deploy/SIGNING.md § Android."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/susurri-release.keystore"
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: publish apk (release-signed)
        if: steps.keystore.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: >
          dotnet publish src/Bootstrapper/Susurri.GUI.Android/Susurri.GUI.Android.csproj
          -c Release -f net10.0-android -o dist/android
          /p:ApplicationVersion=${{ github.run_number }}
          /p:AndroidKeyStore=true
          /p:AndroidSigningKeyStore="$RUNNER_TEMP/susurri-release.keystore"
          /p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS || 'susurri' }}
          /p:AndroidSigningStorePass=env:ANDROID_KEYSTORE_PASS
          /p:AndroidSigningKeyPass=env:ANDROID_KEY_PASS

      - name: publish apk (debug-signed fallback)
        if: steps.keystore.outputs.available != 'true'
        run: >
          dotnet publish src/Bootstrapper/Susurri.GUI.Android/Susurri.GUI.Android.csproj
          -c Release -f net10.0-android -o dist/android
          /p:ApplicationVersion=${{ github.run_number }}

      - name: verify apk signature
        run: |
          apk=$(ls dist/android/*-Signed.apk)
          tool=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$tool" verify --print-certs "$apk"

      - name: upload apk
        uses: actions/upload-artifact@v5
        with:
          name: susurri-android-apk
          path: dist/android/*-Signed.apk
          if-no-files-found: error
