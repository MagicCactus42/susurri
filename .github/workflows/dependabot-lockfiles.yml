name: dependabot-lockfiles

on:
  pull_request:
    paths:
      - '**/Directory.Packages.props'
      - '**/*.csproj'
      - '**/packages.lock.json'

concurrency:
  group: dependabot-lockfiles-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: regenerate lock files
        run: dotnet restore --force-evaluate

      - name: commit lock files if changed
        run: |
          if [ -n "$(git status --porcelain '**/packages.lock.json')" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add '**/packages.lock.json'
            git commit -m 'chore: regenerate lock files for dependabot bump'
            git push
          else
            echo 'lock files already consistent'
          fi
