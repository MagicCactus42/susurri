name: fuzz

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      seconds:
        description: smoke duration in seconds (passed to --seconds)
        required: false
        default: '300'

permissions:
  contents: read

env:
  ContinuousIntegrationBuild: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  smoke:
    name: fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: build fuzz harness
        run: dotnet build tests/Susurri.Tests.Fuzz/Susurri.Tests.Fuzz.csproj --configuration Release --nologo

      - name: run smoke
        shell: bash
        env:
          SECONDS_PER_TARGET: ${{ github.event.inputs.seconds || '300' }}
        run: |
          set -euo pipefail
          mkdir -p fuzz-crashes
          dotnet run --project tests/Susurri.Tests.Fuzz --configuration Release --no-build -- \
            --smoke --seconds "$SECONDS_PER_TARGET" --crashes "$GITHUB_WORKSPACE/fuzz-crashes"

      - name: upload crashes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: fuzz-crashes/
          if-no-files-found: ignore
          retention-days: 30
