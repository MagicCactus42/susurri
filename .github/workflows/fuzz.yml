name: fuzz

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      seconds_per_target:
        description: smoke duration in seconds per target
        required: false
        default: '30'

permissions:
  contents: read

env:
  ContinuousIntegrationBuild: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  smoke:
    name: fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: build fuzz harness
        run: dotnet build tests/Susurri.Tests.Fuzz/Susurri.Tests.Fuzz.csproj --configuration Release --nologo

      - name: list targets
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t TARGETS < <(dotnet run --project tests/Susurri.Tests.Fuzz --configuration Release --no-build -- list)
          printf 'discovered %d targets:\n' "${#TARGETS[@]}"
          printf ' - %s\n' "${TARGETS[@]}"
          {
            echo "list<<EOF"
            printf '%s\n' "${TARGETS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: run smoke per target
        shell: bash
        env:
          SECONDS_PER_TARGET: ${{ github.event.inputs.seconds_per_target || '30' }}
        run: |
          set -euo pipefail
          mkdir -p fuzz-crashes
          failed=0
          while IFS= read -r target; do
            [ -z "$target" ] && continue
            echo "::group::smoke $target"
            if ! dotnet run --project tests/Susurri.Tests.Fuzz --configuration Release --no-build -- \
                  "$target" --smoke --seconds "$SECONDS_PER_TARGET" --crashes "$GITHUB_WORKSPACE/fuzz-crashes"; then
              failed=$((failed + 1))
              echo "::error::fuzz target $target crashed"
            fi
            echo "::endgroup::"
          done <<EOF
          ${{ steps.targets.outputs.list }}
          EOF
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed fuzz target(s) crashed"
            exit 1
          fi

      - name: upload crashes
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: fuzz-crashes/
          if-no-files-found: ignore
          retention-days: 30
