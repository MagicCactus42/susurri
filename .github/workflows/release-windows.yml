name: release-windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'version for a dry run (e.g. 1.2.3); artifacts are uploaded to the run, no GitHub release is created'
        required: true
        type: string

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  ContinuousIntegrationBuild: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: derive version
        id: version
        env:
          RAW_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          $version = $env:RAW_VERSION -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "not a semver version: '$env:RAW_VERSION'"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: validate dependency graph against committed lockfile (locked mode)
        run: |
          dotnet restore src/Bootstrapper/Susurri.GUI/Susurri.GUI.csproj
          dotnet restore src/Bootstrapper/Susurri.CLI/Susurri.CLI.csproj

      - name: publish gui
        run: dotnet publish src/Bootstrapper/Susurri.GUI/Susurri.GUI.csproj -c Release -r win-x64 --self-contained -o staging /p:RestoreLockedMode=false /p:Version=${{ steps.version.outputs.version }}

      - name: publish cli into the same install
        run: dotnet publish src/Bootstrapper/Susurri.CLI/Susurri.CLI.csproj -c Release -r win-x64 --self-contained -o staging /p:RestoreLockedMode=false /p:Version=${{ steps.version.outputs.version }}

      - name: install velopack cli
        run: dotnet tool install -g vpk

      # fetches the previous full package so vpk pack can emit a delta; the first release has nothing to fetch
      - name: download previous release for delta generation
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token $env:GH_TOKEN --outputDir Releases

      - name: vpk pack
        run: vpk pack --packId Susurri --packVersion ${{ steps.version.outputs.version }} --packDir staging --mainExe Susurri.GUI.exe --packTitle Susurri --packAuthors Susurri --outputDir Releases

      # drop the previous version's package pulled in for delta generation; keep only this version's nupkgs
      - name: stage release assets
        run: |
          $version = [regex]::Escape('${{ steps.version.outputs.version }}')
          Get-ChildItem Releases -File -Filter '*.nupkg' |
            Where-Object { $_.Name -notmatch "-$version(-win)?-(full|delta)\.nupkg$" } |
            Remove-Item
          Copy-Item Releases/Susurri-win-Setup.exe Releases/susurri-setup-x64.exe

      - name: generate SHA256SUMS
        run: |
          Get-ChildItem Releases -File |
            Sort-Object Name |
            ForEach-Object { '{0}  {1}' -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name } |
            Set-Content Releases/SHA256SUMS -Encoding ascii

      - name: sign SHA256SUMS with the release key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::GPG_PRIVATE_KEY secret is not set — SHA256SUMS will ship UNSIGNED. See deploy/SIGNING.md."
            exit 0
          fi
          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --armor --detach-sign --output Releases/SHA256SUMS.asc Releases/SHA256SUMS
          gpg --verify Releases/SHA256SUMS.asc Releases/SHA256SUMS
          echo "signed SHA256SUMS -> SHA256SUMS.asc"

      - name: create github release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = Get-ChildItem Releases -File | ForEach-Object { $_.FullName }
          gh release create '${{ github.ref_name }}' --verify-tag --title 'Susurri ${{ steps.version.outputs.version }}' --generate-notes $assets

      - name: upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: susurri-windows-${{ steps.version.outputs.version }}
          path: Releases/
