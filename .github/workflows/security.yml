name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  ContinuousIntegrationBuild: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  codeql:
    name: codeql (csharp)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: init codeql
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: build for analysis
        run: dotnet build --configuration Release /p:TreatWarningsAsErrors=true

      - name: analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:csharp'

  audit:
    name: vulnerable package audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: restore
        run: dotnet restore

      - name: check vulnerable packages
        shell: bash
        env:
          ALLOWED_ADVISORIES: 'GHSA-xrw6-gwf8-vvr9'
        run: |
          set -euo pipefail
          report=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$report"
          unexpected=$(echo "$report" | grep -E '^\s+>' | grep -vE "$ALLOWED_ADVISORIES" || true)
          if [ -n "$unexpected" ]; then
            echo "::error::vulnerable packages detected (after allow-list)"
            echo "$unexpected"
            exit 1
          fi

  osv:
    name: osv-scanner (lockfile + transitive)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv.sarif
            .
        continue-on-error: true
      - name: upload sarif
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv.sarif
          category: osv-scanner

  secrets:
    name: trufflehog (verified secrets only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: trufflehog git history scan
        run: trufflehog git file://. --only-verified --fail --no-update

  format:
    name: dotnet format (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: verify formatting
        shell: bash
        run: |
          set +e
          dotnet format --verify-no-changes --report format-report.json 2>&1 | tee format.log
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::dotnet format would change $(grep -c WHITESPACE format.log || echo 0) lines — informational only"
          fi
          exit 0

      - name: upload format report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: format-report
          path: |
            format.log
            format-report.json
          if-no-files-found: ignore
