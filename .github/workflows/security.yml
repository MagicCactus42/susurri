name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  ContinuousIntegrationBuild: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  codeql:
    name: codeql (csharp)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: init codeql
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: build for analysis
        run: dotnet build --configuration Release /p:TreatWarningsAsErrors=true

      - name: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:csharp'

  audit:
    name: vulnerable package audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: restore
        run: dotnet restore

      - name: check vulnerable packages
        shell: bash
        run: |
          set -euo pipefail
          report=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$report"
          if echo "$report" | grep -q "has the following vulnerable packages"; then
            echo "::error::vulnerable packages detected"
            exit 1
          fi

  osv:
    name: osv-scanner (lockfile + transitive)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.0.0
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv.sarif
            .
        continue-on-error: true
      - name: upload sarif
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv.sarif
          category: osv-scanner

  secrets:
    name: trufflehog (verified secrets only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --fail

  format:
    name: dotnet format (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: verify formatting
        shell: bash
        run: |
          set +e
          dotnet format --verify-no-changes --report format-report.json 2>&1 | tee format.log
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::dotnet format would change $(grep -c WHITESPACE format.log || echo 0) lines — informational only"
          fi
          exit 0

      - name: upload format report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: format-report
          path: |
            format.log
            format-report.json
          if-no-files-found: ignore
